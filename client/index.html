<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProCharacters Cloud</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="brand">
          <h1>ProCharacters Cloud</h1>
          <p>Live AI companion · WebRTC + streaming pipeline</p>
        </div>
        <div class="status-pill">
          <span id="statusDot" class="status-dot"></span>
          <span id="statusText">Idle</span>
        </div>
      </header>

      <main class="layout">
        <section class="panel">
          <div class="video-shell">
            <video id="avatarVideo" autoplay playsinline muted></video>
            <div class="video-overlay">
              <span class="video-badge" id="sessionBadge" title="Click to copy / toggle full ID">Session <span id="sessionLabel">—</span></span>
              <span class="video-badge">ICE <span id="connectionLabel">idle</span></span>
            </div>
          </div>
          <div class="controls">
            <button id="connectBtn" class="btn-primary">Connect</button>
            <button id="disconnectBtn" class="btn-danger" disabled>Disconnect</button>
          </div>
          <div class="resume-controls">
            <input id="resumeInput" placeholder="session id (paste after reload to resume)" />
            <button id="resumeBtn" class="btn-secondary" disabled title="Resume an active server session">Resume</button>
            <button id="refreshSessionsBtn" class="btn-secondary" title="Refresh &amp; show active sessions">↻</button>
            <select id="sessionsSelect" class="sessions-select" title="Select active session to resume" disabled>
              <option value="">— sessions —</option>
            </select>
          </div>
          <div class="companion-config">
            <div class="config-row">
              <label class="config-label" for="avatarSelect">Avatar</label>
              <select id="avatarSelect" class="config-select" title="Avatar style">
                <option value="default">Default</option>
                <option value="professional">Professional</option>
                <option value="casual">Casual</option>
              </select>
            </div>
            <div class="config-row">
              <label class="config-label" for="voiceSelect">Voice</label>
              <select id="voiceSelect" class="config-select" title="Voice style">
                <option value="default">Default</option>
                <option value="warm">Warm</option>
                <option value="bright">Bright</option>
              </select>
            </div>
            <details class="config-details">
              <summary>System prompt (optional)</summary>
              <textarea
                id="systemPromptInput"
                class="config-textarea"
                placeholder="Custom instructions for your companion…"
                rows="3"
              ></textarea>
            </details>
          </div>
        </section>

        <section class="panel chat-panel">
          <div class="chat-header">
            <strong>Conversation</strong>
            <div class="chat-header-actions">
              <span id="memoryIndicator" class="memory-indicator" title="Server-side conversation memory">memory on</span>
              <button id="clearHistoryBtn" class="btn-ghost" disabled title="Clear server history &amp; transcript">Clear history</button>
            </div>
          </div>
          <div class="metrics">
            <div class="metric"><span>Tokens</span><strong id="metricTokens">0</strong></div>
            <div class="metric"><span>Audio chunks</span><strong id="metricAudio">0</strong></div>
            <div class="metric"><span>Video frames</span><strong id="metricFrames">0</strong></div>
          </div>
          <div id="webrtcStats" class="webrtc-stats">WebRTC: —</div>
          <div id="transcript" class="transcript"></div>
          <div class="examples">
            <span class="examples-label">Send example:</span>
            <button type="button" class="ex-btn" data-prompt="Hello! How are you today?">Hello</button>
            <button type="button" class="ex-btn" data-prompt="Tell me a short fun fact.">Fun fact</button>
            <button type="button" class="ex-btn" data-prompt="Can you tell a quick joke?">Joke</button>
            <button type="button" class="ex-btn" data-prompt="Describe what you see.">Describe</button>
          </div>
          <div class="composer">
            <textarea
              id="promptInput"
              placeholder="Say something to your companion…"
            ></textarea>
            <button id="sendBtn" class="btn-secondary" disabled>Send</button>
          </div>
          <div id="log" class="log"></div>
        </section>
      </main>
      <div id="toast" class="toast hidden" aria-live="polite"></div>
    </div>
    <script src="/assets/app.js" type="module"></script>
  </body>
</html>
